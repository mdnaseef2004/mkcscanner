<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markaz Knowledge City</title>
  <meta name="description" content="Markaz Knowledge City - Find us on Instagram, YouTube, Facebook and the Web." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="https://markazknowledgecity.com/favicon.ico" />
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== Intro Overlay ===== */
    #intro-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #ffffff;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: slideOutUp 0.8s cubic-bezier(0.8, 0, 0.2, 1) 2.2s forwards;
    }

    .intro-logo {
      width: 320px;
      max-width: 80%;
      opacity: 0;
      transform: scale(0.9);
      animation: logoFadeInScale 1.2s ease-out 0.2s forwards;
    }

    @keyframes logoFadeInScale {
      0% { opacity: 0; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes slideOutUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-100%); opacity: 0; visibility: hidden; }
    }

    /* ===== Header Banner ===== */
    .header-banner {
      width: 100%;
      height: 180px;
      background: #6e1116;
      position: relative;
      flex-shrink: 0;
    }

    /* ===== Card ===== */
    .card-wrapper {
      width: 100%;
      max-width: 520px;
      padding: 0 16px;
      margin-top: -52px;
      position: relative;
      z-index: 10;
      flex: 1;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      padding: 60px 28px 36px;
      position: relative;
    }

    /* ===== Logo ===== */
    .logo-container {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      position: absolute;
      top: -48px;
      left: 50%;
      transform: translateX(-50%);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;

      /* Entrance animation synced with overlay slide up */
      animation: logoEntrance 1s cubic-bezier(0.22, 1, 0.36, 1) 2.4s forwards;
      opacity: 0;
    }

    .logo-container img {
      width: 85%;
      height: 85%;
      object-fit: contain;
      object-position: center;
    }

    @keyframes logoEntrance {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(20px) scale(0.8);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
      }
    }

    /* ===== Title / Subtitle ===== */
    .profile-info {
      text-align: center;
      margin-bottom: 20px;
      animation: fadeUp 0.8s ease 2.6s forwards;
      opacity: 0;
    }

    .profile-name {
      font-size: 1.35rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .profile-location {
      font-size: 0.85rem;
      color: #888;
      font-weight: 400;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #e8e8e8;
      margin: 18px 0;
      animation: fadeUp 0.8s ease 2.7s forwards;
      opacity: 0;
    }

    /* ===== Section Title ===== */
    .section-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
      animation: fadeUp 0.8s ease 2.8s forwards;
      opacity: 0;
    }

    /* ===== Links List ===== */
    .links-list {
      list-style: none;
    }

    .links-list li {
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }
    .links-list li:nth-child(1) { animation-delay: 2.9s; }
    .links-list li:nth-child(2) { animation-delay: 3.0s; }
    .links-list li:nth-child(3) { animation-delay: 3.1s; }
    .links-list li:nth-child(4) { animation-delay: 3.2s; }

    .link-item {
      display: flex;
      align-items: center;
      padding: 14px 4px;
      border-bottom: 1px solid #f2f2f2;
      text-decoration: none;
      color: inherit;
      transition: background 0.25s ease, transform 0.25s ease;
      border-radius: 12px;
      cursor: pointer;
    }

    .link-item:hover {
      background: #fafafa;
      transform: translateX(4px);
    }

    .link-item:active {
      transform: scale(0.98);
    }

    .link-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 14px;
      flex-shrink: 0;
    }

    .link-icon img,
    .link-icon svg {
      width: 28px;
      height: 28px;
    }

    .link-text {
      flex: 1;
    }

    .link-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    .link-subtitle {
      font-size: 0.75rem;
      color: #999;
      margin-top: 2px;
    }

    .link-arrow {
      color: #ccc;
      font-size: 1.1rem;
      margin-left: 8px;
      transition: transform 0.25s ease, color 0.25s ease;
    }

    .link-item:hover .link-arrow {
      color: #6e1116;
      transform: translateX(4px);
    }

    /* ===== Fade Up Animation ===== */
    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      padding: 28px 0 20px;
      color: #bbb;
      font-size: 0.72rem;
      animation: fadeUp 1s ease 3.5s forwards;
      opacity: 0;
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .header-banner { height: 150px; }
      .card { padding: 56px 20px 28px; }
      .profile-name { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- Intro Overlay -->
  <div id="intro-overlay">
    <img
      src="logo_color.svg"
      alt="Markaz Knowledge City Intro Logo"
      class="intro-logo"
    />
  </div>

  <!-- Header Banner -->
  <div class="header-banner"></div>

  <!-- Card -->
  <div class="card-wrapper">
    <div class="card">

      <!-- Logo with slow-motion entrance -->
      <div class="logo-container" id="logo-container">
        <img
          src="logo_color.svg"
          alt="Markaz Knowledge City Logo"
          id="logo-img"
        />
      </div>

      <!-- Profile Info -->
      <div class="profile-info">
        <h1 class="profile-name">Markaz Knowledge City</h1>
        <p class="profile-location">Calicut, Kerala, India</p>
      </div>

      <div class="divider"></div>

      <!-- Section Title -->
      <p class="section-title">Find me on</p>

      <!-- Social Links -->
      <ul class="links-list">

        <!-- Instagram -->
        <li>
          <a class="link-item" href="https://www.instagram.com/markaz.city/" target="_blank" rel="noopener noreferrer" id="link-instagram">
            <div class="link-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <linearGradient id="ig-grad" x1="0" y1="24" x2="24" y2="0">
                  <stop offset="0%" stop-color="#feda75"/>
                  <stop offset="25%" stop-color="#fa7e1e"/>
                  <stop offset="50%" stop-color="#d62976"/>
                  <stop offset="75%" stop-color="#962fbf"/>
                  <stop offset="100%" stop-color="#4f5bd5"/>
                </linearGradient>
                <rect x="2" y="2" width="20" height="20" rx="5" stroke="url(#ig-grad)" stroke-width="2"/>
                <circle cx="12" cy="12" r="4.5" stroke="url(#ig-grad)" stroke-width="2"/>
                <circle cx="17.5" cy="6.5" r="1.2" fill="url(#ig-grad)"/>
              </svg>
            </div>
            <div class="link-text">
              <div class="link-title">Instagram</div>
              <div class="link-subtitle">markazcity</div>
            </div>
            <span class="link-arrow">→</span>
          </a>
        </li>

        <!-- YouTube -->
        <li>
          <a class="link-item" href="https://www.youtube.com/MarkazCity" target="_blank" rel="noopener noreferrer" id="link-youtube">
            <div class="link-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="4.5" width="20" height="15" rx="4" fill="#FF0000"/>
                <polygon points="10,8.5 16,12 10,15.5" fill="#fff"/>
              </svg>
            </div>
            <div class="link-text">
              <div class="link-title">YouTube</div>
              <div class="link-subtitle">Markaz Knowledge City</div>
            </div>
            <span class="link-arrow">→</span>
          </a>
        </li>

        <!-- Facebook -->
        <li>
          <a class="link-item" href="https://www.facebook.com/markazcity/" target="_blank" rel="noopener noreferrer" id="link-facebook">
            <div class="link-icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <rect width="24" height="24" rx="5" fill="#1877F2"/>
                <path d="M16.5 12.5h-2.5v8h-3v-8H9v-2.5h2v-1.8c0-2 1.2-3.2 3.1-3.2.9 0 1.9.2 1.9.2v2h-1.1c-1 0-1.4.6-1.4 1.3v1.5h2.5l-.5 2.5z" fill="#fff"/>
              </svg>
            </div>
            <div class="link-text">
              <div class="link-title">Facebook</div>
              <div class="link-subtitle">Markaz Knowledge City</div>
            </div>
            <span class="link-arrow">→</span>
          </a>
        </li>

        <!-- Website -->
        <li>
          <a class="link-item" href="https://markazknowledgecity.com" target="_blank" rel="noopener noreferrer" id="link-website">
            <div class="link-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="#555" stroke-width="1.8"/>
                <ellipse cx="12" cy="12" rx="4.5" ry="10" stroke="#555" stroke-width="1.8"/>
                <line x1="2" y1="12" x2="22" y2="12" stroke="#555" stroke-width="1.8"/>
                <line x1="12" y1="2" x2="12" y2="22" stroke="#555" stroke-width="1.8"/>
              </svg>
            </div>
            <div class="link-text">
              <div class="link-title">Web</div>
              <div class="link-subtitle">markazknowledgecity.com</div>
            </div>
            <span class="link-arrow">→</span>
          </a>
        </li>

      </ul>
    </div>

    <!-- Footer -->
    <div class="footer">
      &copy; 2025 Markaz Knowledge City. All rights reserved.
    </div>
  </div>

</body>
</html>

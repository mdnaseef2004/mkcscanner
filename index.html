<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1e5e38" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Markaz Knowledge City — Smart Visitor Guide</title>
  <meta name="description" content="Welcome to Markaz Knowledge City, Calicut. Explore our campus map, download event posters, create social media stories, and rate your visit." />
  <meta name="keywords" content="Markaz Knowledge City, Calicut, Kerala, Islamic education, campus map, visitor guide" />

  <!-- Open Graph -->
  <meta property="og:title" content="Markaz Knowledge City Smart Visitor Guide" />
  <meta property="og:description" content="Explore Markaz Knowledge City campus, navigate facilities, and share your visit." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/logo/markaz_logo.png" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <!-- Premium Icons (Lucide) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- App CSS -->
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/main.css" />

  <!-- Map search dropdown styles (inline for simplicity) -->
  <style>
    #map-search-results {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--bg-card);
      border-radius: var(--border-radius-md);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-color);
      max-height: 240px;
      overflow-y: auto;
      z-index: 600;
    }

    .search-result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: background var(--transition-fast);
      border-bottom: 1px solid var(--border-color);
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--bg-secondary); }
    .result-icon { font-size: 20px; flex-shrink: 0; }
    .result-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .result-desc { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    /* Map popup override */
    .leaflet-popup-content-wrapper {
      border-radius: 14px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2) !important;
    }
    .leaflet-popup-content { margin: 0 !important; padding: 0 !important; }
    .leaflet-popup-tip { background: white !important; }

    /* Story canvas wrapper */
    .story-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* Thank you state */
    #thankyou-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 40px 24px;
      gap: 16px;
      animation: bounceIn 0.5s ease both;
    }

    .thankyou-emoji {
      font-size: 72px;
      animation: heartBeat 1.5s ease infinite;
    }

    /* Lang selector */
    .lang-selector {
      display: flex;
      gap: 4px;
    }
    .lang-btn {
      padding: 4px 9px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .lang-btn.active, .lang-btn:hover {
      background: var(--brand-green-600);
      color: white;
      border-color: var(--brand-green-600);
    }

    /* Map tab section headers */
    .map-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 12px 16px 4px;
    }

    /* Poster upload hint */
    .upload-hint-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(90deg, rgba(212,148,10,0.1), rgba(212,148,10,0.05));
      border: 1px solid var(--border-accent);
      border-radius: var(--border-radius-md);
      padding: 12px 14px;
      margin: 0 16px 16px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Story controls */
    .story-controls {
      width: 100%;
      max-width: 360px;
    }

    .input-group {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    .text-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: var(--border-radius-md);
      background: var(--bg-secondary);
      border: 1.5px solid var(--border-color);
      color: var(--text-primary);
      font-size: 13px;
      transition: all var(--transition-base);
      resize: none;
    }

    .text-input:focus {
      border-color: var(--brand-green-500);
      box-shadow: 0 0 0 3px rgba(35,107,66,0.1);
    }

    /* Review stars row */
    .stars-container {
      text-align: center;
      padding: 16px 0;
    }

    /* Rating pill */
    .rating-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: linear-gradient(135deg, var(--brand-gold-600), var(--brand-gold-400));
      border-radius: var(--border-radius-full);
      color: white;
      font-size: 13px;
      font-weight: 700;
      box-shadow: var(--shadow-gold);
    }
  </style>
</head>

<body>
  <!-- Page Loader -->
  <div id="page-loader" class="page-loader">
    <img class="loader-logo" src="assets/logo/markaz_logo.png" alt="Markaz" onerror="this.style.display='none'" />
    <div class="loader-ring"></div>
    <p class="loader-text" data-i18n="app.loading">Loading Smart Visitor Guide...</p>
  </div>

  <!-- App Shell -->
  <div id="app">

    <!-- Header -->
    <header class="app-header">
      <div class="header-logo">
        <img src="assets/logo/markaz_logo.png" alt="Markaz" onerror="this.style.display='none'" />
        <div class="header-logo-text">
          <span class="title" data-i18n="app.title">Markaz Knowledge City</span>
          <span class="subtitle" data-i18n="app.subtitle">Smart Visitor Guide</span>
        </div>
      </div>
      <div class="header-actions">
        <div class="lang-selector">
          <button class="lang-btn active" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="ml">മ</button>
          <button class="lang-btn" data-lang="ar">ع</button>
        </div>
        <button class="btn-icon" id="theme-toggle" title="Toggle Dark Mode" aria-label="Toggle theme">🌙</button>
      </div>
    </header>

    <!-- Location Banner -->
    <div class="location-banner" role="status" aria-live="polite">
      <span class="pulse-dot"></span>
      <span class="loc-icon">📍</span>
      <div>
        <span class="loc-name" id="current-location-name">Main Entrance Gate</span>
        <div class="loc-sub" id="current-location-sub">Markaz Knowledge City, Calicut</div>
      </div>
    </div>

    <!-- Tab Content -->
    <main class="tab-content" id="tab-content">

      <!-- ════════════════════════════════════
           TAB 1: MAP
           ════════════════════════════════════ -->
      <section class="tab-panel active" id="tab-map" role="tabpanel" aria-labelledby="nav-map">
        <!-- Map Search Bar -->
        <div id="map-container">
          <div class="map-search-bar">
            <i data-lucide="search" class="map-search-icon"></i>
            <input
              type="text"
              id="map-search"
              class="map-search-input"
              placeholder="Search buildings, facilities..."
              data-i18n="map.search_placeholder"
              data-i18n-attr="placeholder"
              autocomplete="off"
              aria-label="Search campus locations"
            />
            <div id="map-search-results"></div>
          </div>

          <!-- Leaflet Map -->
          <div id="leaflet-map" aria-label="Campus Map"></div>

          <!-- Map Controls -->
          <div class="map-controls">
            <button class="map-ctrl-btn" onclick="window.CampusMap.recenter()" title="My Location" aria-label="Re-center to my location">
              <i data-lucide="navigation"></i>
            </button>
            <button class="map-ctrl-btn" onclick="window.CampusMap.map?.zoomIn()" title="Zoom in" aria-label="Zoom in">
              <i data-lucide="plus"></i>
            </button>
            <button class="map-ctrl-btn" onclick="window.CampusMap.map?.zoomOut()" title="Zoom out" aria-label="Zoom out">
              <i data-lucide="minus"></i>
            </button>
          </div>
        </div>

        <!-- Nearby Locations -->
        <div class="map-section-title" data-i18n="map.nearby">Nearby Locations</div>
        <div class="info-card-row" id="nearby-locations" role="list" aria-label="Nearby campus locations">
          <!-- Populated by map.js -->
          <div class="skeleton" style="width:130px; height:110px; border-radius:14px; flex-shrink:0;"></div>
          <div class="skeleton" style="width:130px; height:110px; border-radius:14px; flex-shrink:0;"></div>
          <div class="skeleton" style="width:130px; height:110px; border-radius:14px; flex-shrink:0;"></div>
        </div>
      </section>

    </main>

  </div><!-- /#app -->


  <!-- Toast Container -->
  <div id="toast-container" class="toast-container" aria-live="polite" role="status"></div>

  <!-- Scripts -->
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Supabase JS (optional — load only if credentials are set) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- App Modules (order matters) -->
  <script src="js/analytics.js"></script>
  <script src="js/qr-router.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Markaz Knowledge City</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <style>
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--gradient-hero);
      color: white;
      padding: 32px;
    }
    .offline-card {
      max-width: 340px;
      animation: fadeInUp 0.5s ease;
    }
    .offline-icon { font-size: 80px; animation: float 2.5s ease-in-out infinite; }
    h1 { font-size: 26px; font-weight: 700; margin: 16px 0 8px; }
    p { font-size: 14px; opacity: 0.75; line-height: 1.6; }
    .retry-btn {
      margin-top: 24px;
      padding: 14px 32px;
      background: rgba(212, 148, 10, 0.9);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      It seems you've lost your internet connection.
      Please reconnect to continue exploring Markaz Knowledge City.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">
      🔄 Try Again
    </button>
  </div>
</body>
</html>
